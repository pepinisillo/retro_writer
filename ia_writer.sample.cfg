v1
# Cuerpo que envia la app al endpoint (ejemplo):
#   {"mode":"frase|diez_palabras|cinco_palabras","locale":"es","prompt":"Dame una idea..."}
# Respuesta aceptada: JSON con "idea" (texto). Opcional: "dias" o "dias_disponibles" entero 1-7 (elige el modelo/servidor).
# Si no hay dias en la respuesta, al crear proyecto se usa plazo aleatorio local.
# Si esta linea esta vacia o falla, se usa OpenAI (clave abajo o OPENAI_API_KEY).
endpoint http://192.168.1.50:8080/v1/idea
endpoint2 http://192.168.1.51:8080/v1/idea
endpoint3 http://192.168.1.52:8080/v1/idea
# Opcional: POST para "Entregar escritura IA" -> Comentario IA (cuerpo JSON libre).
feedback_endpoint http://192.168.1.50:8080/v1/feedback
feedback_endpoint2 http://192.168.1.51:8080/v1/feedback
openai_model gpt-4o-mini
# openai_key sk-...
# openai_key_file /ruta/segura/openai.key
timeout_sec 60
